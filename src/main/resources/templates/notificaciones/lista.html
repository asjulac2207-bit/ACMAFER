<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificaciones — ACMAFER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
    <style>
        /* ════════════════════════════════════════════
           NOTIFICACIONES — Glassmorphism Dark Industrial
           Con acentos de metal fundido ACMAFER
        ════════════════════════════════════════════ */

        @keyframes ntGlowPulse {
            0%, 100% { opacity: .55; }
            50% { opacity: 1; }
        }
        @keyframes ntFloatUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes ntEmberDrift {
            0%   { transform: translate(0,0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: .6; }
            100% { transform: translate(var(--dx,20px), -140px) scale(.3); opacity: 0; }
        }
        @keyframes ntBellRing {
            0%, 100% { transform: rotate(0deg); }
            10%  { transform: rotate(14deg); }
            20%  { transform: rotate(-12deg); }
            30%  { transform: rotate(9deg); }
            40%  { transform: rotate(-7deg); }
            50%  { transform: rotate(4deg); }
            60%  { transform: rotate(0deg); }
        }
        @keyframes ntBorderFlow {
            0%   { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* ── Theme variables (sincronizado con data-theme del navbar) ── */
        :root,
        [data-theme="dark"] {
            --nt-bg1: #08080f; --nt-bg2: #0b0814; --nt-bg3: #080c14;
            --nt-surface: rgba(255,255,255,.025);
            --nt-surface-2: rgba(255,255,255,.04);
            --nt-border: rgba(255,255,255,.07);
            --nt-border-2: rgba(255,255,255,.1);
            --nt-border-3: rgba(255,255,255,.12);
            --nt-text-1: #f0f0f8;
            --nt-text-2: #b0b0c8;
            --nt-text-3: #999999;
            --nt-text-4: #666666;
            --nt-text-5: #34344a;
            --nt-text-6: #3a3a55;
            --nt-shadow: rgba(0,0,0,.35);
        }
        [data-theme="light"] {
            --nt-bg1: #f4f1ec; --nt-bg2: #efe9e0; --nt-bg3: #f6f2ec;
            --nt-surface: rgba(255,255,255,.65);
            --nt-surface-2: rgba(255,255,255,.8);
            --nt-border: rgba(20,15,10,.08);
            --nt-border-2: rgba(20,15,10,.12);
            --nt-border-3: rgba(20,15,10,.14);
            --nt-text-1: #1f1a15;
            --nt-text-2: #46403a;
            --nt-text-3: #66605a;
            --nt-text-4: #8a8378;
            --nt-text-5: #a39c8f;
            --nt-text-6: #b3ac9f;
            --nt-shadow: rgba(30,20,10,.1);
        }

        .nt-main {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--nt-bg1) 0%, var(--nt-bg2) 50%, var(--nt-bg3) 100%);
            padding-top: 90px;
            padding-bottom: 60px;
            position: relative;
            overflow-x: hidden;
            transition: background .3s ease;
        }
        .nt-main::before {
            content: '';
            position: fixed; top: -120px; left: -120px;
            width: 560px; height: 560px;
            background: radial-gradient(circle, rgba(255,106,0,.09), transparent 65%);
            pointer-events: none; z-index: 0;
            animation: ntGlowPulse 6s ease-in-out infinite;
        }
        [data-theme="light"] .nt-main::before { background: radial-gradient(circle, rgba(255,106,0,.13), transparent 65%); }
        .nt-main::after {
            content: '';
            position: fixed; bottom: -100px; right: -100px;
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(59,130,246,.06), transparent 65%);
            pointer-events: none; z-index: 0;
            animation: ntGlowPulse 7s ease-in-out infinite 1.5s;
        }
        [data-theme="light"] .nt-main::after { background: radial-gradient(circle, rgba(59,130,246,.09), transparent 65%); }

        /* Embers flotantes */
        .nt-embers { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .nt-ember {
            position: absolute; bottom: -10px;
            width: 3px; height: 3px; border-radius: 50%;
            background: #ff8c3a;
            box-shadow: 0 0 6px 2px rgba(255,106,0,.7);
            animation: ntEmberDrift linear infinite;
        }
        [data-theme="light"] .nt-ember { opacity: .55; }

        .nt-shell {
            position: relative; z-index: 1;
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Hero header ── */
        .nt-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 26px;
            padding: 30px 34px;
            background: linear-gradient(160deg, rgba(255,106,0,.05), var(--nt-surface));
            border: 1px solid var(--nt-border-2);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: ntFloatUp .5s ease both;
            transition: background .3s ease, border-color .3s ease, box-shadow .3s ease;
        }
        [data-theme="light"] .nt-hero { box-shadow: 0 4px 24px var(--nt-shadow); }
        .nt-hero::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #ff6a00, #ffb347, #ff6a00, transparent);
            background-size: 200% 100%;
            animation: ntBorderFlow 4s linear infinite;
        }
        .nt-hero::after {
            content: '';
            position: absolute; top: -40%; right: -10%;
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,106,0,.12), transparent 70%);
            pointer-events: none;
        }

        .nt-hero-eyebrow {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
            color: #ff6a00; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .nt-hero-eyebrow .dot {
            width: 6px; height: 6px; border-radius: 50%; background: #ff6a00;
            box-shadow: 0 0 8px #ff6a00;
            animation: ntGlowPulse 1.6s ease-in-out infinite;
        }
        .nt-hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 3.4vw, 30px); font-weight: 900;
            margin: 0; letter-spacing: .02em;
            display: flex; align-items: center; gap: 12px;
            background: linear-gradient(90deg, var(--nt-text-1), #ffd9b3 60%, #ff8c3a);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .nt-hero-title .bi-bell {
            color: #ff6a00; -webkit-text-fill-color: #ff6a00;
            display: inline-block;
            animation: ntBellRing 2.5s ease-in-out infinite;
            transform-origin: top center;
            filter: drop-shadow(0 0 8px rgba(255,106,0,.6));
        }
        .nt-hero-sub {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px; color: var(--nt-text-4); margin: 8px 0 0;
        }
        .nt-hero-sub strong { color: #ff8c3a; font-weight: 700; }
        .nt-unread-pill {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; font-weight: 700; letter-spacing: .06em;
            color: #ff8c3a;
            background: rgba(255,106,0,.12);
            border: 1px solid rgba(255,106,0,.3);
            border-radius: 20px;
            padding: 3px 10px;
            margin-left: 8px;
        }
        .nt-unread-pill::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: #ff6a00; box-shadow: 0 0 6px #ff6a00;
            animation: ntGlowPulse 1.4s ease-in-out infinite;
        }

        .nt-mark-all {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--nt-text-2);
            background: var(--nt-surface-2);
            border: 1px solid var(--nt-border-3);
            border-radius: 10px;
            padding: 11px 20px;
            cursor: pointer;
            transition: border-color .2s, background .2s, color .2s, transform .15s, box-shadow .2s;
            position: relative; z-index: 1;
        }
        .nt-mark-all:hover {
            border-color: rgba(255,106,0,.5);
            background: rgba(255,106,0,.1);
            color: #ff8c3a;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(255,106,0,.18);
        }

        /* ── Filter tabs ── */
        .nt-tabs {
            display: flex; gap: 8px;
            margin-bottom: 20px;
            animation: ntFloatUp .5s ease .05s both;
        }
        .nt-tab {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--nt-text-4);
            background: var(--nt-surface);
            border: 1px solid var(--nt-border);
            border-radius: 9px;
            padding: 9px 16px;
            cursor: pointer;
            transition: all .2s;
        }
        .nt-tab:hover { border-color: rgba(255,106,0,.3); color: var(--nt-text-2); }
        .nt-tab.active {
            color: #ff8c3a;
            border-color: rgba(255,106,0,.4);
            background: rgba(255,106,0,.1);
            box-shadow: 0 0 14px rgba(255,106,0,.12);
        }

        /* ── Success alert ── */
        .nt-alert {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px; font-weight: 600;
            background: linear-gradient(90deg, rgba(34,197,94,.14), rgba(34,197,94,.04));
            border: 1px solid rgba(34,197,94,.35);
            color: #22a35e;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
            animation: ntFloatUp .4s ease both;
            box-shadow: 0 0 20px rgba(34,197,94,.08);
        }
        [data-theme="dark"] .nt-alert { color: #4ade80; }

        /* ── Empty state ── */
        .nt-empty {
            text-align: center;
            padding: 80px 20px;
            background: var(--nt-surface);
            border: 1px solid var(--nt-border);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: ntFloatUp .5s ease .1s both;
        }
        .nt-empty::before {
            content: '';
            position: absolute; top: 50%; left: 50%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,106,0,.08), transparent 70%);
            transform: translate(-50%,-50%);
        }
        .nt-empty i {
            font-size: 56px; color: rgba(255,106,0,.18);
            position: relative;
            filter: drop-shadow(0 0 16px rgba(255,106,0,.15));
        }
        .nt-empty p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px; letter-spacing: .12em;
            color: var(--nt-text-6); margin-top: 16px;
            position: relative;
        }

        /* ── Notification card ── */
        .nt-list { display: flex; flex-direction: column; }
        .nt-card {
            background: var(--nt-surface);
            border: 1px solid var(--nt-border);
            border-radius: 14px;
            padding: 18px 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: border-color .2s, transform .15s, box-shadow .2s, background .2s;
            position: relative;
            overflow: hidden;
            animation: ntFloatUp .45s ease both;
        }
        .nt-card:hover {
            border-color: rgba(255,106,0,.28);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--nt-shadow);
        }
        .nt-card.unread {
            border-left: 3px solid #ff6a00;
            background: linear-gradient(90deg, rgba(255,106,0,.08), var(--nt-surface) 40%);
        }
        .nt-card.unread::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, #ff6a0088, transparent 60%);
        }
        .nt-card.unread::after {
            content: '';
            position: absolute; top: 14px; right: 14px;
            width: 8px; height: 8px; border-radius: 50%;
            background: #ff6a00;
            box-shadow: 0 0 8px 2px rgba(255,106,0,.6);
            animation: ntGlowPulse 1.6s ease-in-out infinite;
        }

        .nt-icon {
            width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 19px;
            transition: transform .2s;
        }
        .nt-card:hover .nt-icon { transform: scale(1.08) rotate(-3deg); }
        .nt-icon.pedido { background: rgba(59,130,246,.15); color: #2f6fd6; border: 1px solid rgba(59,130,246,.28); box-shadow: 0 0 14px rgba(59,130,246,.1); }
        .nt-icon.tarea   { background: rgba(245,158,11,.15); color: #b8790b; border: 1px solid rgba(245,158,11,.28); box-shadow: 0 0 14px rgba(245,158,11,.1); }
        .nt-icon.general { background: var(--nt-surface-2); color: var(--nt-text-3); border: 1px solid var(--nt-border-3); }
        [data-theme="dark"] .nt-icon.pedido { color: #60a5fa; }
        [data-theme="dark"] .nt-icon.tarea { color: #fbbf24; }

        .nt-body { flex: 1; min-width: 0; }
        .nt-msg {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14.5px; color: var(--nt-text-2);
            margin: 0; line-height: 1.45;
        }
        .nt-msg.unread-text { font-weight: 700; color: var(--nt-text-1); }

        .nt-footer-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 12px;
        }
        .nt-date {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: var(--nt-text-5); letter-spacing: .04em;
            display: flex; align-items: center; gap: 5px;
        }
        .nt-actions { display: flex; gap: 8px; }

        .nt-btn {
            display: inline-flex; align-items: center; gap: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px; font-weight: 700;
            letter-spacing: .06em; text-transform: uppercase;
            border-radius: 8px;
            padding: 7px 13px;
            text-decoration: none;
            cursor: pointer;
            transition: all .2s;
            border: 1px solid var(--nt-border-2);
            background: var(--nt-surface-2);
            color: var(--nt-text-3);
        }
        .nt-btn:hover { border-color: rgba(255,106,0,.4); color: #ff8c3a; background: rgba(255,106,0,.1); transform: translateY(-1px); }
        .nt-btn.check {
            padding: 7px 9px;
            background: rgba(34,197,94,.08);
            border-color: rgba(34,197,94,.25);
            color: #1f9c56;
        }
        [data-theme="dark"] .nt-btn.check { color: #4ade80; }
        .nt-btn.check:hover { background: rgba(34,197,94,.16); border-color: rgba(34,197,94,.4); }

        /* stagger animation delays */
        .nt-card:nth-child(1) { animation-delay: .05s; }
        .nt-card:nth-child(2) { animation-delay: .1s; }
        .nt-card:nth-child(3) { animation-delay: .15s; }
        .nt-card:nth-child(4) { animation-delay: .2s; }
        .nt-card:nth-child(5) { animation-delay: .25s; }
        .nt-card:nth-child(n+6) { animation-delay: .3s; }
    </style>
</head>

<body>
    <canvas id="particlesBg"></canvas>
    <div class="nt-embers" id="ntEmbers"></div>
    <div th:replace="~{layout/navbar :: navbar}"></div>

    <main class="nt-main">
        <div class="nt-shell">

            <!-- ── Hero header ── -->
            <div class="nt-hero">
                <div>
                    <div class="nt-hero-eyebrow"><span class="dot"></span>// ACMAFER · CENTRO DE AVISOS</div>
                    <h1 class="nt-hero-title">
                        <i class="bi bi-bell"></i>
                        <span data-i18n="notif_page_title">Notificaciones</span>
                    </h1>
                    <p class="nt-hero-sub" th:if="${!notificaciones.isEmpty()}">
                        Tienes <strong th:text="${#lists.size(notificaciones)}">0</strong> notificaciones en total
                        <span class="nt-unread-pill" th:if="${notificaciones.?[!leida].size() > 0}"
                              th:text="${notificaciones.?[!leida].size()} + ' sin leer'">0 sin leer</span>
                    </p>
                </div>
                <form th:action="@{/notificaciones/marcar-todas}" method="post" th:if="${!notificaciones.isEmpty()}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="nt-mark-all">
                        <i class="bi bi-check-all"></i> Marcar todas leídas
                    </button>
                </form>
            </div>

            <!-- ── Success alert ── -->
            <div class="nt-alert" th:if="${exito}">
                <span><i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span></span>
                <i class="bi bi-x" style="cursor:pointer" onclick="this.closest('.nt-alert').remove()"></i>
            </div>

            <!-- ── Filter tabs ── -->
            <div class="nt-tabs" th:if="${!notificaciones.isEmpty()}">
                <div class="nt-tab active" data-filter="todas" onclick="ntFilter('todas', this)">Todas</div>
                <div class="nt-tab" data-filter="unread" onclick="ntFilter('unread', this)">Sin leer</div>
            </div>

            <!-- ── Empty state ── -->
            <div class="nt-empty" th:if="${notificaciones.isEmpty()}">
                <i class="bi bi-bell-slash"></i>
                <p>// NO TIENES NOTIFICACIONES</p>
            </div>

            <!-- ── Notification list ── -->
            <div class="nt-list" id="ntList">
                <div th:each="n : ${notificaciones}"
                     class="nt-card"
                     th:classappend="${!n.leida} ? 'unread' : ''">

                    <div class="nt-icon"
                         th:classappend="${n.tipo == 'PEDIDO' or n.tipo == 'pedido_nuevo'} ? 'pedido' : (${n.tipo == 'TAREA'} ? 'tarea' : 'general')">
                        <i th:class="${n.tipo == 'PEDIDO' or n.tipo == 'pedido_nuevo'} ? 'bi bi-cart3' : (${n.tipo == 'TAREA'} ? 'bi bi-kanban' : 'bi bi-bell')"></i>
                    </div>

                    <div class="nt-body">
                        <p class="nt-msg" th:classappend="${!n.leida} ? 'unread-text' : ''" th:text="${n.mensaje}">Mensaje</p>

                        <div class="nt-footer-row">
                            <span class="nt-date">
                                <i class="bi bi-clock" style="font-size:9px"></i>
                                <span th:text="${#temporals.format(n.fechaCreacion,'dd/MM/yyyy HH:mm')}"></span>
                            </span>
                            <div class="nt-actions">
                                <a th:if="${n.urlDestino}" th:href="${n.urlDestino}" class="nt-btn">
                                    <i class="bi bi-arrow-right"></i> Ver
                                </a>
                                <button th:unless="${n.leida}"
                                        class="nt-btn check"
                                        th:onclick="'marcarLeida(' + ${n.id} + ', this)'"
                                        type="button">
                                    <i class="bi bi-check"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /nt-shell -->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/acmafer.js}"></script>
    <script th:inline="javascript">
      /*<![CDATA[*/
      var csrfToken = /*[[${_csrf.token}]]*/ '';
      var csrfHeader = /*[[${_csrf.headerName}]]*/ '';
      /*]]>*/

      async function marcarLeida(id, btn) {
        await fetch('/notificaciones/' + id + '/marcar-leida', {
          method: 'POST',
          headers: { [csrfHeader]: csrfToken }
        });
        const card = btn.closest('.nt-card');
        card.classList.remove('unread');
        const msg = card.querySelector('.nt-msg');
        if (msg) msg.classList.remove('unread-text');
        btn.remove();
      }

      function ntFilter(type, el) {
        document.querySelectorAll('.nt-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('#ntList .nt-card').forEach(card => {
          card.style.display = (type === 'unread' && !card.classList.contains('unread')) ? 'none' : 'flex';
        });
      }

      // Brasas flotantes decorativas
      (function ntEmbers() {
        const container = document.getElementById('ntEmbers');
        if (!container) return;
        const count = 14;
        for (let i = 0; i < count; i++) {
          const ember = document.createElement('div');
          ember.className = 'nt-ember';
          const left = Math.random() * 100;
          const duration = 6 + Math.random() * 6;
          const delay = Math.random() * 8;
          const dx = (Math.random() - 0.5) * 60;
          ember.style.left = left + 'vw';
          ember.style.setProperty('--dx', dx + 'px');
          ember.style.animationDuration = duration + 's';
          ember.style.animationDelay = delay + 's';
          container.appendChild(ember);
        }
      })();
    </script>
    <div th:replace="~{layout/navbar :: chatbot}"></div>
    <div th:replace="~{layout/navbar :: cartNotif}"></div>
    <footer th:replace="~{layout/navbar :: footer}"></footer>
    <th:block th:replace="~{layout/navbar :: scripts}"></th:block>
</body>
</html>
