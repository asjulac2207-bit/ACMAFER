<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${producto.nombre + ' — ACMAFER'}">Detalle Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
</head>

<body>
    <canvas id="particlesBg"></canvas>
    <div th:replace="~{layout/navbar :: navbar}"></div>
    <main class="acm-main" style="padding-top:80px">
        <div class="container" style="max-width:760px">
            <a th:href="@{/productos/catalogo}" class="acm-btn acm-btn-outline acm-btn-sm mb-4">
                <i class="bi bi-arrow-left"></i> Volver al catálogo
            </a>
            <div class="row g-4">
                <div class="col-md-5">
                    <div
                        style="background:var(--acm-gray-lt);border-radius:12px;height:280px;display:flex;align-items:center;justify-content:center;overflow:hidden">
                        <img th:if="${producto.rutaImagen != null and !#strings.isEmpty(producto.rutaImagen)}"
                            th:src="${producto.rutaImagen}" style="width:100%;height:100%;object-fit:cover" alt="" />
                        <i th:unless="${producto.rutaImagen}" class="bi bi-box-seam"
                            style="font-size:80px;color:var(--acm-primary);opacity:.2"></i>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="acm-card h-100">
                        <div class="acm-card-body">
                            <span class="acm-status" th:classappend="' ' + ${#strings.toLowerCase(producto.estado)}"
                                th:text="${producto.estado}">Estado</span>
                            <h1 style="font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--acm-primary);margin:12px 0 4px"
                                th:text="${producto.nombre}">Nombre</h1>
                            <div style="font-size:12px;color:var(--acm-gray);margin-bottom:12px"
                                th:text="'Código: ' + ${producto.codigo}">COD</div>
                            <p style="font-size:13px;color:var(--acm-gray);line-height:1.6;margin-bottom:16px"
                                th:text="${producto.descripcion ?: 'Sin descripción.'}">Desc</p>
                            <div class="row g-3 mb-4">
                                <div class="col-6">
                                    <span class="acm-label">Precio unitario</span>
                                    <div style="font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--acm-orange)"
                                        th:text="${'$' + #numbers.formatDecimal(producto.precioUnitario,0,'COMMA',0,'POINT')}">
                                        $0</div>
                                </div>
                                <div class="col-6">
                                    <span class="acm-label">Stock disponible</span>
                                    <div style="font-family:var(--font-display);font-size:24px;font-weight:700"
                                        th:text="${producto.stockActual}"
                                        th:style="${producto.tieneStockBajo()} ? 'color:var(--acm-red)' : 'color:var(--acm-green)'">
                                        0</div>
                                </div>
                                <div class="col-12" th:if="${producto.categoria}">
                                    <span class="acm-label">Categoría</span>
                                    <div th:text="${producto.categoria.nombre}">Cat</div>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="acm-btn acm-btn-primary btn-solicitar"
                                    th:if="${producto.estaDisponible()}" th:data-id="${producto.id}"
                                    th:data-nombre="${producto.nombre}"
                                    th:data-precio="${producto.precioUnitario != null ? producto.precioUnitario.toPlainString() : ''}"
                                    th:data-stock="${producto.stockActual}">
                                    <i class="bi bi-cart-plus"></i> Solicitar
                                </button>
                                <a th:href="@{'/productos/editar/' + ${producto.id}}" class="acm-btn acm-btn-outline"
                                    sec:authorize="hasRole('ADMINISTRADOR')">
                                    <i class="bi bi-pencil"></i> Editar
                                </a>
                                <form th:action="@{'/productos/eliminar/' + ${producto.id}}" method="post"
                                    sec:authorize="hasAnyRole('ADMINISTRADOR','SUPERVISOR')"
                                    onsubmit="return confirm('¿Estás seguro?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="acm-btn"
                                        style="background:var(--acm-red,#c0392b);border-color:var(--acm-red,#c0392b);">
                                        <i class="bi bi-trash"></i> Eliminar
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Drawer del carrito -->
        <div th:replace="~{pedidos/drawer-carrito :: drawer}"></div>

    </main>

    <div th:replace="~{layout/navbar :: chatbot}"></div>
    <div th:replace="~{layout/navbar :: cartNotif}"></div>
    <footer th:replace="~{layout/navbar :: footer}"></footer>
    <th:block th:replace="~{layout/navbar :: scripts}"></th:block>
</body>

</html>
