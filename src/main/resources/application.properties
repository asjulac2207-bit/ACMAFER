# ═══════════════════════════════════════════════════════════════════════
# ACMAFER — application.properties
# Todas las credenciales se leen de variables de entorno.
# En local: exporta las variables o usa tu IDE (Run Configuration / .env).
# En Render: se configuran en el panel "Environment".
# Ver .env.example para la lista completa de variables requeridas.
# ═══════════════════════════════════════════════════════════════════════
spring.application.name=acmafer-web

# ── Base de datos (Supabase / PostgreSQL) ──────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── Correo transaccional (SendGrid API, no SMTP) ───────────────────────
# SENDGRID_API_KEY se lee directamente de la variable de entorno (no requiere línea aquí)
acmafer.mail.from=${MAIL_FROM}

# ── Thymeleaf ───────────────────────────────────────────────────────────
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Sesión ───────────────────────────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}

# ── Archivos ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Servidor (Render inyecta la variable PORT dinámicamente) ─────────────
server.port=${PORT:8080}
server.error.whitelabel.enabled=false

# ── Logging ──────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{20}] - %msg%n
logging.level.org.springframework.web=INFO
logging.level.com.acmafer=INFO
logging.level.org.hibernate.SQL=WARN

# ── App ──────────────────────────────────────────────────────────────────
acmafer.bcrypt.strength=${ACMAFER_BCRYPT_STRENGTH:10}
acmafer.token.expiracion-minutos=30
acmafer.captcha.intentos-antes-de-activar=3
acmafer.upload.directorio=uploads

# ── Login con Google ───────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── ePayco ───────────────────────────────────────────────────────────────
epayco.public-key=${EPAYCO_PUBLIC_KEY}
epayco.private-key=${EPAYCO_PRIVATE_KEY}
epayco.customer-id=${EPAYCO_CUSTOMER_ID}
epayco.p-key=${EPAYCO_P_KEY}
epayco.test=${EPAYCO_TEST:true}
epayco.response-url=${EPAYCO_RESPONSE_URL:http://localhost:8080/pedidos/pago/respuesta}
epayco.confirmation-url=${EPAYCO_CONFIRMATION_URL:http://localhost:8080/pedidos/pago/confirmacion}

# ── Groq AI (AcmaBot) ──────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions