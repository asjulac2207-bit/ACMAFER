<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>500 — ACMAFER</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link th:href="@{/css/acmafer.css}" rel="stylesheet"/>
</head>
<body>
<canvas id="particlesBg"></canvas>
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;position:relative;z-index:1">
  <div style="font-size:5rem;filter:drop-shadow(0 0 20px rgba(239,68,68,.5))">⚠️</div>
  <h1 style="font-family:'Orbitron',monospace;font-size:5rem;font-weight:900;color:#ef4444;margin:.5rem 0">500</h1>
  <h2 style="font-family:'Orbitron',monospace;font-size:1.3rem;color:var(--text);margin-bottom:.75rem"><span data-i18n="err_500_title">Error del Servidor</span></h2>
  <p style="color:var(--text-m);max-width:400px;margin-bottom:2rem">Algo salió mal en el servidor. Nuestro equipo fue notificado. Intenta de nuevo en unos momentos.</p>
  <div style="display:flex;gap:1rem">
    <a th:href="@{/dashboard}" style="padding:.8rem 2rem;background:linear-gradient(135deg,#FF6A00,#E65C00);color:#fff;border-radius:12px;text-decoration:none;font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700">Dashboard</a>
    <a href="javascript:history.back()" style="padding:.8rem 2rem;background:rgba(255,255,255,.08);color:var(--text);border:1px solid rgba(255,106,0,.2);border-radius:12px;text-decoration:none;font-size:.88rem">← Volver</a>
  </div>
</div>
<script th:src="@{/js/particles.js}"></script>
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('acmafer_theme')||'dark');</script>
  <div class="lang-switcher-float" id="langSwitcher"></div>
  <script src="/js/i18n.js"></script>
</body>
</html>
