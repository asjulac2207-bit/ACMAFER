<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — ACMAFER</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link th:href="@{/css/acmafer.css}" rel="stylesheet"/>
</head>
<body>
<canvas id="particlesBg"></canvas>
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;position:relative;z-index:1">
  <div style="font-size:5rem;filter:drop-shadow(0 0 20px rgba(255,106,0,.5))">🏭</div>
  <h1 style="font-family:'Orbitron',monospace;font-size:5rem;font-weight:900;color:#FF6A00;margin:.5rem 0">404</h1>
  <h2 style="font-family:'Orbitron',monospace;font-size:1.3rem;color:var(--text);margin-bottom:.75rem"><span data-i18n="err_404_title">Página no encontrada</span></h2>
  <p style="color:var(--text-m);max-width:400px;margin-bottom:2rem">La página que buscas no existe o fue movida. Regresa al sistema ACMAFER.</p>
  <a th:href="@{/}" style="padding:.8rem 2rem;background:linear-gradient(135deg,#FF6A00,#E65C00);color:#fff;border-radius:12px;text-decoration:none;font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700;letter-spacing:1px">
    🔥 Volver al Inicio
  </a>
</div>
<script th:src="@{/js/particles.js}"></script>
<script>
  const t=localStorage.getItem('acmafer_theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
</script>
  <div class="lang-switcher-float" id="langSwitcher"></div>
  <script src="/js/i18n.js"></script>
</body>
</html>
