<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis Tareas — ACMAFER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
    <style>
        /* ════════════════════════════════════════════
           MIS TAREAS — Glassmorphism Dark/Light
           Mismo sistema visual que dashboard / notificaciones
        ════════════════════════════════════════════ */

        @keyframes tkGlowPulse {
            0%, 100% { opacity: .55; }
            50% { opacity: 1; }
        }
        @keyframes tkFloatUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes tkEmberDrift {
            0%   { transform: translate(0,0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: .6; }
            100% { transform: translate(var(--dx,20px), -140px) scale(.3); opacity: 0; }
        }
        @keyframes tkBorderFlow {
            0%   { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes tkCheckPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        /* ── Theme variables (sincronizado con data-theme del navbar) ── */
        :root,
        [data-theme="dark"] {
            --tk-bg1: #08080f; --tk-bg2: #0b0814; --tk-bg3: #080c14;
            --tk-surface: rgba(255,255,255,.025);
            --tk-surface-2: rgba(255,255,255,.04);
            --tk-border: rgba(255,255,255,.07);
            --tk-border-2: rgba(255,255,255,.1);
            --tk-border-3: rgba(255,255,255,.12);
            --tk-text-1: #f0f0f8;
            --tk-text-2: #b0b0c8;
            --tk-text-3: #999999;
            --tk-text-4: #666666;
            --tk-text-5: #3a3a55;
            --tk-shadow: rgba(0,0,0,.35);
            --tk-select-bg: rgba(255,255,255,.05);
        }
        [data-theme="light"] {
            --tk-bg1: #f4f1ec; --tk-bg2: #efe9e0; --tk-bg3: #f6f2ec;
            --tk-surface: rgba(255,255,255,.65);
            --tk-surface-2: rgba(255,255,255,.85);
            --tk-border: rgba(20,15,10,.08);
            --tk-border-2: rgba(20,15,10,.12);
            --tk-border-3: rgba(20,15,10,.14);
            --tk-text-1: #1f1a15;
            --tk-text-2: #46403a;
            --tk-text-3: #66605a;
            --tk-text-4: #8a8378;
            --tk-text-5: #a39c8f;
            --tk-shadow: rgba(30,20,10,.1);
            --tk-select-bg: rgba(20,15,10,.03);
        }

        .tk-main {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--tk-bg1) 0%, var(--tk-bg2) 50%, var(--tk-bg3) 100%);
            padding-top: 90px;
            padding-bottom: 60px;
            position: relative;
            overflow-x: hidden;
            transition: background .3s ease;
        }
        .tk-main::before {
            content: '';
            position: fixed; top: -120px; left: -120px;
            width: 560px; height: 560px;
            background: radial-gradient(circle, rgba(255,106,0,.09), transparent 65%);
            pointer-events: none; z-index: 0;
            animation: tkGlowPulse 6s ease-in-out infinite;
        }
        [data-theme="light"] .tk-main::before { background: radial-gradient(circle, rgba(255,106,0,.13), transparent 65%); }
        .tk-main::after {
            content: '';
            position: fixed; bottom: -100px; right: -100px;
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(59,130,246,.06), transparent 65%);
            pointer-events: none; z-index: 0;
            animation: tkGlowPulse 7s ease-in-out infinite 1.5s;
        }
        [data-theme="light"] .tk-main::after { background: radial-gradient(circle, rgba(59,130,246,.09), transparent 65%); }

        /* Embers flotantes */
        .tk-embers { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .tk-ember {
            position: absolute; bottom: -10px;
            width: 3px; height: 3px; border-radius: 50%;
            background: #ff8c3a;
            box-shadow: 0 0 6px 2px rgba(255,106,0,.7);
            animation: tkEmberDrift linear infinite;
        }
        [data-theme="light"] .tk-ember { opacity: .55; }

        .tk-shell {
            position: relative; z-index: 1;
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Hero header ── */
        .tk-hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 26px;
            padding: 28px 32px;
            background: linear-gradient(160deg, rgba(255,106,0,.05), var(--tk-surface));
            border: 1px solid var(--tk-border-2);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: tkFloatUp .5s ease both;
            transition: background .3s ease, border-color .3s ease, box-shadow .3s ease;
        }
        [data-theme="light"] .tk-hero { box-shadow: 0 4px 24px var(--tk-shadow); }
        .tk-hero::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, #ff6a00, #ffb347, #ff6a00, transparent);
            background-size: 200% 100%;
            animation: tkBorderFlow 4s linear infinite;
        }
        .tk-hero::after {
            content: '';
            position: absolute; top: -40%; right: -10%;
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,106,0,.12), transparent 70%);
            pointer-events: none;
        }
        .tk-hero-eyebrow {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
            color: #ff6a00; margin-bottom: 8px;
            display: flex; align-items: center; gap: 8px;
        }
        .tk-hero-eyebrow .dot {
            width: 6px; height: 6px; border-radius: 50%; background: #ff6a00;
            box-shadow: 0 0 8px #ff6a00;
            animation: tkGlowPulse 1.6s ease-in-out infinite;
        }
        .tk-hero-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(22px, 3.4vw, 30px); font-weight: 900;
            margin: 0; letter-spacing: .02em;
            display: flex; align-items: center; gap: 12px;
            background: linear-gradient(90deg, var(--tk-text-1), #ffd9b3 60%, #ff8c3a);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .tk-hero-title i {
            color: #ff6a00; -webkit-text-fill-color: #ff6a00;
            filter: drop-shadow(0 0 8px rgba(255,106,0,.6));
        }

        /* Rendimiento ring */
        .tk-rend {
            display: flex; align-items: center; gap: 14px;
        }
        .tk-rend-ring {
            position: relative;
            width: 68px; height: 68px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: conic-gradient(#ff6a00 calc(var(--pct,0) * 1%), var(--tk-border-2) 0);
        }
        .tk-rend-ring::before {
            content: '';
            position: absolute; inset: 6px;
            border-radius: 50%;
            background: var(--tk-bg2);
        }
        [data-theme="light"] .tk-rend-ring::before { background: #f4f1ec; }
        .tk-rend-ring span {
            position: relative; z-index: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px; font-weight: 700; color: var(--tk-text-1);
        }
        .tk-rend-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px; font-weight: 700;
            letter-spacing: .12em; text-transform: uppercase;
            color: var(--tk-text-4);
        }
        .tk-rend-sub { font-size: 13px; color: var(--tk-text-3); margin-top: 2px; }

        /* ── Success alert ── */
        .tk-alert {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px; font-weight: 600;
            background: linear-gradient(90deg, rgba(34,197,94,.14), rgba(34,197,94,.04));
            border: 1px solid rgba(34,197,94,.35);
            color: #22a35e;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
            animation: tkFloatUp .4s ease both;
            box-shadow: 0 0 20px rgba(34,197,94,.08);
        }
        [data-theme="dark"] .tk-alert { color: #4ade80; }

        /* ── Filter tabs ── */
        .tk-tabs {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-bottom: 20px;
            animation: tkFloatUp .5s ease .05s both;
        }
        .tk-tab {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--tk-text-4);
            background: var(--tk-surface);
            border: 1px solid var(--tk-border);
            border-radius: 9px;
            padding: 9px 16px;
            cursor: pointer;
            transition: all .2s;
        }
        .tk-tab:hover { border-color: rgba(255,106,0,.3); color: var(--tk-text-2); }
        .tk-tab.active {
            color: #ff8c3a;
            border-color: rgba(255,106,0,.4);
            background: rgba(255,106,0,.1);
            box-shadow: 0 0 14px rgba(255,106,0,.12);
        }

        /* ── Empty state ── */
        .tk-empty {
            text-align: center;
            padding: 80px 20px;
            background: var(--tk-surface);
            border: 1px solid var(--tk-border);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: tkFloatUp .5s ease .1s both;
        }
        .tk-empty::before {
            content: '';
            position: absolute; top: 50%; left: 50%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(34,197,94,.1), transparent 70%);
            transform: translate(-50%,-50%);
        }
        .tk-empty i {
            font-size: 56px; color: #4ade80;
            position: relative;
            filter: drop-shadow(0 0 16px rgba(74,222,128,.25));
            animation: tkCheckPulse 2.2s ease-in-out infinite;
            display: inline-block;
        }
        .tk-empty p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px; letter-spacing: .12em;
            color: var(--tk-text-5); margin-top: 16px;
            position: relative;
        }

        /* ── Task grid ── */
        .tk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .tk-card {
            background: var(--tk-surface);
            border: 1px solid var(--tk-border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: border-color .2s, transform .15s, box-shadow .2s;
            animation: tkFloatUp .45s ease both;
            display: flex;
            flex-direction: column;
        }
        .tk-card:hover {
            border-color: rgba(255,106,0,.26);
            transform: translateY(-3px);
            box-shadow: 0 10px 28px var(--tk-shadow);
        }
        .tk-card::before {
            content: '';
            position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
        }
        .tk-card.prio-ALTA::before, .tk-card.prio-URGENTE::before { background: linear-gradient(180deg, #ef4444, #ef444400); }
        .tk-card.prio-MEDIA::before { background: linear-gradient(180deg, #f59e0b, #f59e0b00); }
        .tk-card.prio-BAJA::before  { background: linear-gradient(180deg, #22c55e, #22c55e00); }

        .tk-card-top {
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 8px; margin-bottom: 12px;
        }

        .tk-badge {
            font-family: 'Rajdhani', sans-serif;
            font-size: 10.5px; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            padding: 4px 10px; border-radius: 20px;
            display: inline-flex; align-items: center; gap: 5px;
            white-space: nowrap;
        }
        .tk-badge.prio-ALTA, .tk-badge.prio-URGENTE { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
        .tk-badge.prio-MEDIA { background: rgba(245,158,11,.15); color: #fbbf24; border: 1px solid rgba(245,158,11,.3); }
        .tk-badge.prio-BAJA  { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }

        .tk-badge.estado-en-progreso   { background: rgba(59,130,246,.15); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }
        .tk-badge.estado-bloqueada     { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }
        .tk-badge.estado-completada    { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.3); }

        .tk-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 15.5px; font-weight: 700;
            color: var(--tk-text-1); margin-bottom: 8px;
            line-height: 1.35;
        }
        .tk-desc {
            font-family: 'Rajdhani', sans-serif;
            font-size: 13.5px; color: var(--tk-text-3);
            margin-bottom: 14px; line-height: 1.5;
            flex-grow: 1;
        }

        .tk-meta {
            display: flex; flex-direction: column; gap: 6px;
            margin-bottom: 16px;
        }
        .tk-meta-row {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12.5px; color: var(--tk-text-4);
            display: flex; align-items: center; gap: 6px;
        }
        .tk-meta-row i { color: #ff8c3a; font-size: 12px; }
        .tk-meta-row strong { color: var(--tk-text-2); font-weight: 700; }

        .tk-form {
            display: flex; gap: 8px;
            margin-bottom: 10px;
        }
        .tk-select {
            flex: 1;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12.5px; font-weight: 600;
            color: var(--tk-text-1);
            background: var(--tk-select-bg);
            border: 1px solid var(--tk-border-2);
            border-radius: 8px;
            padding: 8px 10px;
            outline: none;
            transition: border-color .2s;
        }
        .tk-select:focus { border-color: rgba(255,106,0,.4); }

        .tk-btn-submit {
            width: 40px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,106,0,.14);
            border: 1px solid rgba(255,106,0,.32);
            color: #ff8c3a;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
        }
        .tk-btn-submit:hover { background: rgba(255,106,0,.24); transform: translateY(-1px); }

        .tk-btn-detail {
            display: flex; align-items: center; justify-content: center; gap: 7px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12.5px; font-weight: 700;
            letter-spacing: .05em; text-transform: uppercase;
            color: var(--tk-text-3);
            background: var(--tk-surface-2);
            border: 1px solid var(--tk-border-2);
            border-radius: 9px;
            padding: 10px;
            text-decoration: none;
            transition: all .2s;
        }
        .tk-btn-detail:hover { border-color: rgba(255,106,0,.4); color: #ff8c3a; background: rgba(255,106,0,.08); }

        /* stagger animation delays */
        .tk-card:nth-child(1) { animation-delay: .04s; }
        .tk-card:nth-child(2) { animation-delay: .08s; }
        .tk-card:nth-child(3) { animation-delay: .12s; }
        .tk-card:nth-child(4) { animation-delay: .16s; }
        .tk-card:nth-child(5) { animation-delay: .2s; }
        .tk-card:nth-child(6) { animation-delay: .24s; }
        .tk-card:nth-child(n+7) { animation-delay: .28s; }
    </style>
</head>

<body>
    <canvas id="particlesBg"></canvas>
    <div class="tk-embers" id="tkEmbers"></div>
    <div th:replace="~{layout/navbar :: navbar}"></div>
    <main class="tk-main">
        <div class="tk-shell">

            <!-- ── Hero header ── -->
            <div class="tk-hero">
                <div>
                    <div class="tk-hero-eyebrow"><span class="dot"></span>// ACMAFER · GESTIÓN DE TAREAS</div>
                    <h1 class="tk-hero-title">
                        <i class="bi bi-check2-square"></i>
                        <span data-i18n="tar_my_title">Mis Tareas</span>
                    </h1>
                </div>
                <div class="tk-rend">
                    <div class="tk-rend-ring" th:style="'--pct:' + ${rendimiento}">
                        <span th:text="${rendimiento} + '%'">0%</span>
                    </div>
                    <div>
                        <div class="tk-rend-label">Rendimiento</div>
                        <div class="tk-rend-sub">Tareas completadas</div>
                    </div>
                </div>
            </div>

            <!-- Alertas -->
            <div class="tk-alert" th:if="${exito}">
                <span><i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span></span>
                <i class="bi bi-x" style="cursor:pointer" onclick="this.closest('.tk-alert').remove()"></i>
            </div>

            <!-- Filtros por estado -->
            <div class="tk-tabs" th:if="${!asignaciones.isEmpty()}">
                <div class="tk-tab active" data-filter="todas" onclick="tkFilter('todas', this)">Todas</div>
                <div class="tk-tab" data-filter="en-progreso" onclick="tkFilter('en-progreso', this)">En progreso</div>
                <div class="tk-tab" data-filter="bloqueada" onclick="tkFilter('bloqueada', this)">Bloqueadas</div>
                <div class="tk-tab" data-filter="completada" onclick="tkFilter('completada', this)">Completadas</div>
            </div>

            <!-- Sin tareas -->
            <div class="tk-empty" th:if="${asignaciones.isEmpty()}">
                <i class="bi bi-check2-all"></i>
                <p>// NO TIENES TAREAS ASIGNADAS POR AHORA</p>
            </div>

            <!-- Tarjetas de tareas -->
            <div class="tk-grid" id="tkGrid" th:unless="${asignaciones.isEmpty()}">
                <div class="tk-card"
                     th:each="asig : ${asignaciones}"
                     th:classappend="'prio-' + ${asig.tarea.prioridad} + ' est-' + ${asig.tarea.estado.name().toLowerCase().replace('_','-')}">

                    <div class="tk-card-top">
                        <span class="tk-badge" th:classappend="'prio-' + ${asig.tarea.prioridad}" th:text="${asig.tarea.prioridad}">MEDIA</span>
                        <span class="tk-badge" th:classappend="'estado-' + ${asig.tarea.estado.name().toLowerCase().replace('_','-')}" th:text="${asig.tarea.estado}">Estado</span>
                    </div>

                    <h5 class="tk-title" th:text="${asig.tarea.titulo}">Título</h5>
                    <p class="tk-desc" th:text="${asig.tarea.descripcion ?: 'Sin descripción.'}">Desc</p>

                    <div class="tk-meta">
                        <div class="tk-meta-row" th:if="${asig.tarea.fechaVencimiento}">
                            <i class="bi bi-calendar2"></i> Vence:
                            <strong th:text="${#temporals.format(asig.tarea.fechaVencimiento,'dd/MM/yyyy')}"></strong>
                        </div>
                        <div class="tk-meta-row">
                            <i class="bi bi-person"></i> Asignado por:
                            <strong th:text="${asig.asignadoPor != null ? asig.asignadoPor.nombreCompleto : ''}">Admin</strong>
                        </div>
                    </div>

                    <!-- Cambiar estado — RF-47 -->
                    <form th:action="@{'/tareas/cambiar-estado/' + ${asig.tarea.id}}" method="post" class="tk-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <select name="nuevoEstado" class="tk-select">
                            <option value="EN_PROGRESO">En progreso</option>
                            <option value="BLOQUEADA">Bloqueada</option>
                            <option value="COMPLETADA">Completada</option>
                        </select>
                        <button type="submit" class="tk-btn-submit"><i class="bi bi-check-lg"></i></button>
                    </form>

                    <!-- Ver detalle / comentar -->
                    <a th:href="@{'/tareas/detalle/' + ${asig.tarea.id}}" class="tk-btn-detail">
                        <i class="bi bi-chat-left-text"></i> Ver detalle y comentarios
                    </a>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/acmafer.js}"></script>
    <script>
        function tkFilter(type, el) {
            document.querySelectorAll('.tk-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('#tkGrid .tk-card').forEach(card => {
                const match = type === 'todas' || card.classList.contains('est-' + type);
                card.style.display = match ? 'flex' : 'none';
            });
        }

        // Brasas flotantes decorativas
        (function tkEmbers() {
            const container = document.getElementById('tkEmbers');
            if (!container) return;
            const count = 14;
            for (let i = 0; i < count; i++) {
                const ember = document.createElement('div');
                ember.className = 'tk-ember';
                const left = Math.random() * 100;
                const duration = 6 + Math.random() * 6;
                const delay = Math.random() * 8;
                const dx = (Math.random() - 0.5) * 60;
                ember.style.left = left + 'vw';
                ember.style.setProperty('--dx', dx + 'px');
                ember.style.animationDuration = duration + 's';
                ember.style.animationDelay = delay + 's';
                container.appendChild(ember);
            }
        })();
    </script>
    <div th:replace="~{layout/navbar :: chatbot}"></div>
    <div th:replace="~{layout/navbar :: cartNotif}"></div>
    <footer th:replace="~{layout/navbar :: footer}"></footer>
    <th:block th:replace="~{layout/navbar :: scripts}"></th:block>
</body>

</html>
