<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificar código — ACMAFER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
</head>

<body
    style="background:linear-gradient(135deg, #0a1628 0%, #1a2332 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px">
    <div style="width:100%;max-width:440px">

        <div class="text-center mb-4">
            <span style="font-family:var(--font-display);font-size:36px;font-weight:800;color:var(--acm-primary)">
                ACM<span style="color:var(--acm-orange)">AFER</span>
            </span>
            <h2 style="font-family:var(--font-display);font-size:22px;color:#ffffff;margin-top:12px">
                <span data-i18n="ver_title">Nueva contraseña</span>
            </h2>
            <p style="color:#8899aa;font-size:13px">
                Ingresa el código que llegó a tu correo y tu nueva contraseña.<br />
                <strong>El código expira en 30 minutos.</strong>
            </p>
        </div>

        <div class="acm-card">
            <div class="acm-card-body">
                <div class="alert acm-alert-danger mb-3" th:if="${error}">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                </div>

                <form th:action="@{/auth/recuperar/nueva-clave}" method="post" autocomplete="off">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">
                        <label class="acm-label" data-i18n="ver_code_label">Código de verificación</label>
                        <input type="text" name="codigoVerificacion" class="acm-input text-center"
                            style="font-size:24px;font-weight:700;letter-spacing:12px" placeholder="000000"
                            maxlength="6" required autocomplete="one-time-code" autocapitalize="off" spellcheck="false"
                            autofocus />
                    </div>

                    <div class="mb-3">
                        <label class="acm-label">Nueva contraseña (mínimo 8 caracteres)</label>
                        <input type="password" name="clave" id="pwdInput" class="acm-input" placeholder="••••••••"
                            minlength="8" required autocomplete="new-password" />
                    </div>

                    <div class="mb-4">
                        <label class="acm-label">Confirmar contraseña</label>
                        <input type="password" id="pwdConfirm" class="acm-input" placeholder="••••••••" required
                            autocomplete="new-password" />
                        <div id="pwdError" class="text-danger mt-1" style="font-size:12px;display:none">
                            Las contraseñas no coinciden.
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="acm-btn acm-btn-primary w-100"
                        style="justify-content:center;padding:13px">
                        <i class="bi bi-check-circle"></i> Restablecer contraseña
                    </button>
                </form>
            </div>
        </div>

        <p style="text-align:center;margin-top:20px;font-size:13px;color:#8899aa">
            ¿No recibiste el código?
            <a th:href="@{/auth/recuperar}" style="color:var(--acm-primary);font-weight:600;text-decoration:none">
                Solicitar de nuevo
            </a>
        </p>
    </div>

    <!-- Selector de idioma flotante -->
    <div class="lang-switcher-float" id="langSwitcher"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/i18n.js"></script>
    <script>
        const pwd = document.getElementById('pwdInput');
        const conf = document.getElementById('pwdConfirm');
        const err = document.getElementById('pwdError');
        const btn = document.getElementById('submitBtn');

        function validar() {
            const mismatch = conf.value.length > 0 && pwd.value !== conf.value;
            err.style.display = mismatch ? 'block' : 'none';
            btn.disabled = mismatch;
        }
        pwd.addEventListener('input', validar);
        conf.addEventListener('input', validar);
    </script>
</body>

</html>
