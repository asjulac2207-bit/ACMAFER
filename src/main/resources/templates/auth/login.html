<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — ACMAFER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap"
    rel="stylesheet" />
  <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem
    }

    .login-wrap {
      width: 100%;
      max-width: 430px;
      position: relative;
      z-index: 1
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--card-b);
      border-radius: 22px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--fire-2), var(--spark), var(--fire-1))
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem
    }

    .login-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto .75rem;
      filter: drop-shadow(0 0 12px rgba(255, 106, 0, .6))
    }

    .login-brand h1 {
      font-family: var(--fd);
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--fire-1);
      letter-spacing: 3px
    }

    .login-brand p {
      font-size: .82rem;
      color: var(--text-m);
      margin: 0
    }

    .btn-login-submit {
      width: 100%;
      padding: .9rem;
      background: linear-gradient(135deg, var(--fire-1), var(--fire-2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: var(--fd);
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all var(--t);
      box-shadow: 0 6px 20px rgba(255, 106, 0, .35)
    }

    .btn-login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 106, 0, .5)
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .88rem;
      color: var(--text-m)
    }

    .login-footer a {
      color: var(--fire-1);
      font-weight: 600
    }

    .btn-back-home {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .6rem 1.1rem;
      background: var(--card);
      border: 1px solid var(--card-b);
      border-radius: 10px;
      color: var(--text-m);
      font-family: var(--fd);
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-decoration: none;
      transition: all var(--t);
    }

    .btn-back-home:hover {
      color: var(--fire-1);
      border-color: var(--fire-1);
      transform: translateX(-3px);
      box-shadow: 0 4px 14px rgba(255, 106, 0, .2);
    }

    @media (max-width: 480px) {
      .btn-back-home span {
        display: none;
      }

      .btn-back-home {
        padding: .6rem .75rem;
      }
    }
  </style>
</head>

<body>
  <!-- Intro overlay ELIMINADO -->

  <canvas id="particlesBg"></canvas>

  <a th:href="@{/}" class="btn-back-home">
    <i class="bi bi-arrow-left"></i>
    <span data-i18n="back_home">Volver al inicio</span>
  </a>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">
          <svg viewBox="0 0 50 50" fill="none">
            <path d="M25 5 L45 40 H5 Z" fill="url(#lf1)" />
            <circle cx="25" cy="28" r="8" fill="url(#lf2)" />
            <defs>
              <linearGradient id="lf1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#FF6A00" />
                <stop offset="100%" stop-color="#CC7032" />
              </linearGradient>
              <radialGradient id="lf2">
                <stop offset="0%" stop-color="#FFFF66" />
                <stop offset="100%" stop-color="#FF6A00" />
              </radialGradient>
            </defs>
          </svg>
        </div>
        <h1>ACMAFER</h1>
        <p data-i18n="login_title">Sistema de Gestión Industrial</p>
      </div>

      <div class="acm-alert acm-alert-danger" th:if="${error}">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}">Error</span>
      </div>
      <div class="acm-alert acm-alert-success" th:if="${exito}">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${exito}">OK</span>
      </div>

      <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="mb-3">
          <label class="acm-label" data-i18n="login_email_label">Correo electrónico</label>
          <input type="email" name="username" class="acm-input" data-i18n-placeholder="login_email_ph"
            placeholder="correo@acmafer.com" required autocomplete="email" />
        </div>
        <div class="mb-3">
          <label class="acm-label" data-i18n="login_pass_label">Contraseña</label>
          <input type="password" name="password" class="acm-input" placeholder="••••••••" required
            autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login-submit" data-i18n="login_btn">🔥 Ingresar al Sistema</button>
      </form>

      <div class="text-center my-3" style="color:var(--text-m);font-size:.8rem">— o —</div>

      <a th:href="@{/oauth2/authorization/google}"
        class="btn w-100 d-flex align-items-center justify-content-center gap-2"
        style="background:#fff;color:#3c4043;border-radius:12px;padding:.8rem;font-weight:600;text-decoration:none;border:1px solid #dadce0">
        <i class="bi bi-google" style="color:#4285F4"></i>
        <span data-i18n="login_google">Continuar con Google</span>
      </a>

      <div class="login-footer">
        <p><span data-i18n="login_no_account">¿No tienes cuenta?</span> <a th:href="@{/auth/registro}"
            data-i18n="login_register_link">Regístrate aquí</a></p>
        <p class="mt-1"><a th:href="@{/auth/recuperar}" style="color:var(--text-m)"><span
              data-i18n="login_forgot">¿Olvidaste tu contraseña?</span></a></p>
      </div>
    </div>
  </div>

  <!-- Selector de idioma flotante -->
  <div class="lang-switcher-float" id="langSwitcher"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/particles.js}"></script>
  <script th:src="@{/js/acmafer.js}"></script>
  <script th:src="@{/js/i18n.js}"></script>
</body>

</html>
