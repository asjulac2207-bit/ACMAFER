<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titulo} ?: 'ACMAFER'">ACMAFER</title>

    <!-- Bootstrap 5 + Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- CSS propio ACMAFER -->
    <link rel="stylesheet" th:href="@{/css/acmafer.css}">

    <!-- FIX: evitar que el navegador cachee páginas que dependen de
         datos de sesión dinámicos (ej. avatar de perfil) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
</head>

<body th:fragment="body(contenido)">

    <!-- Fondo de partículas -->
    <div id="particlesBg"></div>

    <!-- ════════════════ NAVBAR ════════════════ -->
    <nav th:replace="~{layout/navbar :: navbar}"></nav>

    <!-- ════════════════ CONTENIDO DE CADA PÁGINA ════════════════ -->
    <main class="acm-main">
        <div th:replace="${contenido}"></div>
    </main>

    <!-- ════════════════ FOOTER ════════════════ -->
    <footer th:replace="~{layout/navbar :: footer}"></footer>

    <!-- ════════════════ CHATBOT ════════════════ -->
    <div th:replace="~{layout/navbar :: chatbot}"></div>

    <!-- ════════════════ NOTIFICACIÓN DE CARRITO ════════════════ -->
    <div th:replace="~{layout/navbar :: cartNotif}"></div>

    <!-- ════════════════ SCRIPTS COMUNES ════════════════ -->
    <th:block th:replace="~{layout/navbar :: scripts}"></th:block>

</body>

</html>
