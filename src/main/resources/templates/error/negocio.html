<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/><title>Error — ACMAFER</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link th:href="@{/css/acmafer.css}" rel="stylesheet"/>
</head>
<body style="background:var(--acm-gray-lt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px">
<div style="max-width:480px;text-align:center">
    <i class="bi bi-exclamation-circle" style="font-size:64px;color:var(--acm-orange)"></i>
    <h2 style="font-family:var(--font-display);font-size:26px;color:var(--acm-primary);margin-top:16px">
        Operación no permitida
    </h2>
    <p style="color:var(--acm-gray);font-size:14px;margin-top:8px" th:text="${mensaje}">
        Ha ocurrido un error de validación.
    </p>
    <div class="d-flex gap-3 justify-content-center mt-4">
        <button onclick="history.back()" class="acm-btn acm-btn-primary">
            <i class="bi bi-arrow-left"></i> Volver
        </button>
        <a th:href="@{/dashboard}" class="acm-btn acm-btn-outline">
            <i class="bi bi-house"></i> Dashboard
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="~{layout/navbar :: chatbot}"></div>
<div th:replace="~{layout/navbar :: cartNotif}"></div>
<footer th:replace="~{layout/navbar :: footer}"></footer>
<th:block th:replace="~{layout/navbar :: scripts}"></th:block>
  <div class="lang-switcher-float" id="langSwitcher"></div>
  <script src="/js/i18n.js"></script>
</body>
</html>
