<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestionar Pedido — ACMAFER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
</head>

<body>
    <canvas id="particlesBg"></canvas>
    <div th:replace="~{layout/navbar :: navbar}"></div>
    <main class="acm-main" style="padding-top:80px">
        <div class="container" style="max-width:860px">

            <a th:href="@{/pedidos/todos}" class="acm-btn acm-btn-outline acm-btn-sm mb-4">
                <i class="bi bi-arrow-left"></i> Volver a pedidos
            </a>

            <div class="alert acm-alert-success alert-dismissible fade show mb-3" th:if="${exito}">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="alert acm-alert-danger alert-dismissible fade show mb-3" th:if="${error}">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4">
                <div class="col-md-8">
                    <div class="acm-card mb-4">
                        <div class="acm-card-header">
                            <i class="bi bi-cart3"></i>
                            Pedido <span th:text="${pedido.numeroPedido}"></span>
                            <span class="ms-auto acm-status"
                                th:classappend="' estado-' + ${pedido.estado != null ? pedido.estado.toLowerCase().replace(' ','-') : ''}"
                                th:text="${pedido.estado}"></span>
                        </div>
                        <div class="acm-card-body">
                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <span class="acm-label">Solicitante</span>
                                    <div th:text="${pedido.usuario != null ? pedido.usuario.nombreCompleto : 'N/A'}">
                                        Nombre</div>
                                </div>
                                <div class="col-sm-6">
                                    <span class="acm-label">Fecha</span>
                                    <div th:text="${#temporals.format(pedido.fechaPedido,'dd/MM/yyyy HH:mm')}">Fecha
                                    </div>
                                </div>
                                <div class="col-12" th:if="${pedido.notas != null and !pedido.notas.isBlank()}">
                                    <span class="acm-label">Notas</span>
                                    <div th:text="${pedido.notas}"></div>
                                </div>
                            </div>
                            <table class="acm-table">
                                <thead>
                                    <tr>
                                        <th>Producto</th>
                                        <th>Cant.</th>
                                        <th>Precio unit.</th>
                                        <th>Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="det : ${pedido.detalles}">
                                        <td th:text="${det.producto.nombre}">Prod</td>
                                        <td th:text="${det.cantidad}">0</td>
                                        <td
                                            th:text="${'$' + #numbers.formatDecimal(det.precioUnitario,0,'COMMA',0,'POINT')}">
                                            $0</td>
                                        <td th:text="${'$' + #numbers.formatDecimal(det.subtotal,0,'COMMA',0,'POINT')}">
                                            $0</td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr style="font-weight:700">
                                        <td colspan="3" style="text-align:right;padding:12px 16px">Total:</td>
                                        <td
                                            th:text="${pedido.total != null ? '$' + #numbers.formatDecimal(pedido.total,0,'COMMA',0,'POINT') : '$0'}">
                                            $0</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>

                    <div class="acm-card">
                        <div class="acm-card-header"><i class="bi bi-clock-history"></i> Historial</div>
                        <div class="acm-card-body" style="max-height:220px;overflow-y:auto">
                            <div th:if="${historial == null or historial.isEmpty()}"
                                style="color:var(--acm-gray);font-size:13px">Sin historial.</div>
                            <div class="d-flex gap-3 align-items-start mb-3" th:each="h : ${historial}"
                                th:if="${historial != null}">
                                <div
                                    style="width:8px;height:8px;border-radius:50%;background:var(--acm-primary);flex-shrink:0;margin-top:6px">
                                </div>
                                <div>
                                    <div style="font-size:13px">
                                        <strong
                                            th:text="${h.estadoAnterior != null ? h.estadoAnterior : 'NUEVO'}">-</strong>
                                        <i class="bi bi-arrow-right mx-1"></i>
                                        <strong style="color:var(--acm-primary)" th:text="${h.estadoNuevo}">-</strong>
                                    </div>
                                    <div style="font-size:11px;color:var(--acm-gray)">
                                        <span th:text="${#temporals.format(h.fechaCambio,'dd/MM/yyyy HH:mm')}"></span>
                                        · <span
                                            th:text="${h.modificadoPor != null ? h.modificadoPor.nombreCompleto : ''}"></span>
                                    </div>
                                    <div th:if="${h.observacion}" style="font-size:12px;font-style:italic"
                                        th:text="${h.observacion}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Panel cambiar estado — solo si no está Entregado ni Cancelado -->
                <div class="col-md-4" th:if="${pedido.estado != 'Entregado' and pedido.estado != 'Cancelado'}"
                    sec:authorize="hasAnyRole('ADMINISTRADOR','SUPERVISOR')">
                    <div class="acm-card" style="position:sticky;top:80px">
                        <div class="acm-card-header"><i class="bi bi-gear"></i> Cambiar estado</div>
                        <div class="acm-card-body">
                            <form th:action="@{/pedidos/cambiar-estado/{id}(id=${pedido.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <div class="mb-3">
                                    <label class="acm-label">Nuevo estado</label>
                                    <select name="estado" class="acm-input">
                                        <option value="Procesando">Procesando</option>
                                        <option value="Enviado">Enviado</option>
                                        <option value="Entregado">Entregado</option>
                                        <option value="Cancelado">Cancelado</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="acm-label">Observación</label>
                                    <textarea name="observacion" class="acm-input" rows="3"
                                        placeholder="Motivo del cambio..."></textarea>
                                </div>
                                <button type="submit" class="acm-btn acm-btn-primary w-100"
                                    style="justify-content:center">
                                    <i class="bi bi-check-circle"></i> Confirmar
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/acmafer.js}"></script>
    <div th:replace="~{layout/navbar :: chatbot}"></div>
    <div th:replace="~{layout/navbar :: cartNotif}"></div>
    <footer th:replace="~{layout/navbar :: footer}"></footer>
    <th:block th:replace="~{layout/navbar :: scripts}"></th:block>
</body>

</html>
