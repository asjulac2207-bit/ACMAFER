<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios — ACMAFER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
  <style>
    /* ════════════════════════════════════════════
       USUARIOS — sistema visual ACMAFER Glass Industrial (wk-)
    ════════════════════════════════════════════ */

    @keyframes wkGlowPulse { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
    @keyframes wkFloatUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes wkEmberDrift {
      0%   { transform: translate(0,0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: .6; }
      100% { transform: translate(var(--dx,20px), -140px) scale(.3); opacity: 0; }
    }
    @keyframes wkBorderFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

    :root, [data-theme="dark"] {
      --wk-bg1: #08080f; --wk-bg2: #0b0814; --wk-bg3: #080c14;
      --wk-surface: rgba(255,255,255,.025);
      --wk-surface-2: rgba(255,255,255,.04);
      --wk-border: rgba(255,255,255,.07);
      --wk-border-2: rgba(255,255,255,.1);
      --wk-border-3: rgba(255,255,255,.12);
      --wk-text-1: #f0f0f8;
      --wk-text-2: #b0b0c8;
      --wk-text-3: #999999;
      --wk-text-4: #666666;
      --wk-text-5: #3a3a55;
      --wk-shadow: rgba(0,0,0,.35);
    }
    [data-theme="light"] {
      --wk-bg1: #f4f1ec; --wk-bg2: #efe9e0; --wk-bg3: #f6f2ec;
      --wk-surface: rgba(255,255,255,.65);
      --wk-surface-2: rgba(255,255,255,.8);
      --wk-border: rgba(20,15,10,.08);
      --wk-border-2: rgba(20,15,10,.12);
      --wk-border-3: rgba(20,15,10,.14);
      --wk-text-1: #1f1a15;
      --wk-text-2: #46403a;
      --wk-text-3: #66605a;
      --wk-text-4: #8a8378;
      --wk-text-5: #a39c8f;
      --wk-shadow: rgba(30,20,10,.1);
    }

    .wk-main {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--wk-bg1) 0%, var(--wk-bg2) 50%, var(--wk-bg3) 100%);
      padding-top: 90px; padding-bottom: 60px;
      position: relative; overflow-x: hidden;
      transition: background .3s ease;
    }
    .wk-main::before {
      content: ''; position: fixed; top: -120px; left: -120px;
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(255,106,0,.09), transparent 65%);
      pointer-events: none; z-index: 0;
      animation: wkGlowPulse 6s ease-in-out infinite;
    }
    [data-theme="light"] .wk-main::before { background: radial-gradient(circle, rgba(255,106,0,.13), transparent 65%); }
    .wk-main::after {
      content: ''; position: fixed; bottom: -100px; right: -100px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(59,130,246,.06), transparent 65%);
      pointer-events: none; z-index: 0;
      animation: wkGlowPulse 7s ease-in-out infinite 1.5s;
    }
    [data-theme="light"] .wk-main::after { background: radial-gradient(circle, rgba(59,130,246,.09), transparent 65%); }

    .wk-embers { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .wk-ember {
      position: absolute; bottom: -10px;
      width: 3px; height: 3px; border-radius: 50%;
      background: #ff8c3a;
      box-shadow: 0 0 6px 2px rgba(255,106,0,.7);
      animation: wkEmberDrift linear infinite;
    }
    [data-theme="light"] .wk-ember { opacity: .55; }

    .wk-shell { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 24px; }

    /* ── Hero header ── */
    .wk-hero {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 20px;
      margin-bottom: 28px; padding: 30px 34px;
      background: linear-gradient(160deg, rgba(255,106,0,.05), var(--wk-surface));
      border: 1px solid var(--wk-border-2);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      position: relative; overflow: hidden;
      animation: wkFloatUp .5s ease both;
      transition: background .3s ease, border-color .3s ease, box-shadow .3s ease;
    }
    [data-theme="light"] .wk-hero { box-shadow: 0 4px 24px var(--wk-shadow); }
    .wk-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #ff6a00, #ffb347, #ff6a00, transparent);
      background-size: 200% 100%;
      animation: wkBorderFlow 4s linear infinite;
    }
    .wk-hero::after {
      content: ''; position: absolute; top: -40%; right: -10%;
      width: 260px; height: 260px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,106,0,.12), transparent 70%);
      pointer-events: none;
    }
    .wk-hero-eyebrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
      color: #ff6a00; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .wk-hero-eyebrow .dot {
      width: 6px; height: 6px; border-radius: 50%; background: #ff6a00;
      box-shadow: 0 0 8px #ff6a00;
      animation: wkGlowPulse 1.6s ease-in-out infinite;
    }
    .wk-hero-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(22px, 3.4vw, 30px); font-weight: 900;
      margin: 0; letter-spacing: .02em;
      display: flex; align-items: center; gap: 12px;
      background: linear-gradient(90deg, var(--wk-text-1), #ffd9b3 60%, #ff8c3a);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .wk-hero-title i { color: #ff6a00; -webkit-text-fill-color: #ff6a00; filter: drop-shadow(0 0 8px rgba(255,106,0,.6)); }
    .wk-hero-sub { font-family: 'Rajdhani', sans-serif; font-size: 15px; color: var(--wk-text-4); margin: 8px 0 0; }

    .wk-hero-actions { display: flex; gap: 10px; flex-shrink: 0; }
    .wk-btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px;
      background: linear-gradient(135deg, #ff6a00, #e65c00);
      border: none; border-radius: 10px;
      color: #fff; font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: .04em;
      text-decoration: none; cursor: pointer;
      box-shadow: 0 6px 18px rgba(255,106,0,.25);
      transition: transform .15s, box-shadow .2s;
    }
    .wk-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255,106,0,.35); color: #fff; }

    /* ── KPI cards ── */
    .wk-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }
    .wk-kpi {
      background: var(--wk-surface);
      border: 1px solid var(--wk-border);
      border-radius: 12px; padding: 20px 22px;
      backdrop-filter: blur(10px);
      position: relative; overflow: hidden;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      animation: wkFloatUp .45s ease both;
    }
    [data-theme="light"] .wk-kpi { box-shadow: 0 2px 14px var(--wk-shadow); }
    .wk-kpi:hover { border-color: rgba(255,106,0,.25); transform: translateY(-2px); }
    .wk-kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .wk-kpi.orange::before { background: linear-gradient(90deg, #ff6a00, transparent); }
    .wk-kpi.green::before  { background: linear-gradient(90deg, #22c55e, transparent); }
    .wk-kpi.red::before    { background: linear-gradient(90deg, #ef4444, transparent); }
    .wk-kpi-icon { font-size: 22px; margin-bottom: 12px; display: block; }
    .wk-kpi.orange .wk-kpi-icon { color: #ff6a00; }
    .wk-kpi.green  .wk-kpi-icon { color: #4ade80; }
    .wk-kpi.red    .wk-kpi-icon { color: #f87171; }
    .wk-kpi-val { font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 700; color: var(--wk-text-1); line-height: 1; margin-bottom: 6px; }
    .wk-kpi-label { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--wk-text-4); }

    /* ── Section title ── */
    .wk-section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
      color: #ff6a00; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .wk-section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, #ff6a0030, transparent); }

    /* ── Glass card ── */
    .wk-card {
      background: var(--wk-surface);
      border: 1px solid var(--wk-border);
      border-radius: 14px; overflow: hidden;
      backdrop-filter: blur(10px);
      animation: wkFloatUp .5s ease .05s both;
      margin-bottom: 28px;
    }
    [data-theme="light"] .wk-card { box-shadow: 0 4px 20px var(--wk-shadow); }
    .wk-card-head {
      display: flex; align-items: center; gap: 9px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--wk-border);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
      background: rgba(255,106,0,.05);
      color: #ff8c3a;
    }
    .wk-glow { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #ff6a00; box-shadow: 0 0 7px #ff6a00; }
    .wk-card-body { padding: 20px; }

    /* ── Búsqueda ── */
    .us-search-form { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .wk-input {
      background: var(--wk-surface-2);
      border: 1px solid var(--wk-border-2);
      color: var(--wk-text-1);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      flex: 1 1 260px;
      min-width: 220px;
    }
    .wk-input::placeholder { color: var(--wk-text-4); }
    .wk-btn-search {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,106,0,.15);
      border: 1px solid rgba(255,106,0,.35);
      color: #ff8c3a;
      border-radius: 8px; padding: 9px 18px;
      font-family: 'Rajdhani', sans-serif; font-size: 12.5px; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .wk-btn-search:hover { background: rgba(255,106,0,.24); }

    /* ── Tabla de usuarios ── */
    .us-thead {
      display: grid;
      grid-template-columns: 2.2fr 1.8fr 1.1fr 1.1fr .9fr .9fr 1fr;
      gap: 8px; padding: 10px 20px;
      background: rgba(255,106,0,.05);
      border-bottom: 1px solid var(--wk-border);
    }
    .us-thead-cell {
      font-size: 9px; color: var(--wk-text-4);
      letter-spacing: .07em;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
    }
    .us-row {
      display: grid;
      grid-template-columns: 2.2fr 1.8fr 1.1fr 1.1fr .9fr .9fr 1fr;
      gap: 8px; align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--wk-border);
      transition: background .15s;
    }
    .us-row:last-child { border-bottom: none; }
    .us-row:hover { background: rgba(255,106,0,.03); }
    .us-cell { font-size: 12px; color: var(--wk-text-3); font-family: 'Rajdhani', sans-serif; }

    .us-user { display: flex; align-items: center; gap: 10px; }
    .us-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #ff6a00, #e65c00);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
      color: #fff;
    }
    .us-name { font-family: 'Rajdhani', sans-serif; font-size: 13.5px; font-weight: 700; color: var(--wk-text-1); }
    .us-phone { font-size: 11px; color: var(--wk-text-4); font-family: 'Rajdhani', sans-serif; }

    .mp-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .05em;
      font-family: 'Orbitron', sans-serif; white-space: nowrap;
    }
    .mp-badge .mp-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .mp-badge.admin      { background: rgba(34,197,94,.15);  border: 1px solid rgba(34,197,94,.35);  color: #22c55e; }
    .mp-badge.admin      .mp-dot { background: #22c55e; }
    .mp-badge.supervisor { background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.35); color: #60a5fa; }
    .mp-badge.supervisor .mp-dot { background: #60a5fa; }
    .mp-badge.vendedor   { background: rgba(255,106,0,.15);  border: 1px solid rgba(255,106,0,.35);  color: #ff8c3a; }
    .mp-badge.vendedor   .mp-dot { background: #ff8c3a; }
    .mp-badge.neutro     { background: rgba(255,255,255,.06); border: 1px solid var(--wk-border-2); color: var(--wk-text-3); }
    .mp-badge.neutro     .mp-dot { background: var(--wk-text-4); }
    .mp-badge.activo     { background: rgba(34,197,94,.15);  border: 1px solid rgba(34,197,94,.35);  color: #22c55e; }
    .mp-badge.activo     .mp-dot { background: #22c55e; }
    .mp-badge.inactivo   { background: rgba(239,68,68,.15);  border: 1px solid rgba(239,68,68,.35);  color: #ef4444; }
    .mp-badge.inactivo   .mp-dot { background: #ef4444; }
    .mp-badge.bloqueado  { background: rgba(239,68,68,.15);  border: 1px solid rgba(239,68,68,.35);  color: #ef4444; }
    .mp-badge.bloqueado  .mp-dot { background: #ef4444; }
    .mp-badge.desbloqueado { background: rgba(34,197,94,.15); border: 1px solid rgba(34,197,94,.35); color: #22c55e; }
    .mp-badge.desbloqueado .mp-dot { background: #22c55e; }

    .us-actions { display: flex; gap: 5px; justify-content: flex-end; align-items: center; }
    .us-btn-icon {
      background: var(--wk-surface-2);
      border: 1px solid var(--wk-border-2);
      border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer;
      color: var(--wk-text-3); transition: all .15s;
      text-decoration: none; display: inline-flex; align-items: center;
    }
    .us-btn-icon:hover { border-color: #ff6a00; color: #ff8c3a; }
    .us-btn-danger {
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer;
      color: #f87171; transition: all .15s;
      display: inline-flex; align-items: center;
    }
    .us-btn-danger:hover { background: rgba(239,68,68,.2); border-color: rgba(239,68,68,.5); }

    .wk-alert {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 10px;
      font-size: 13px; margin-bottom: 14px; border: 1px solid;
      font-family: 'Rajdhani', sans-serif;
    }
    .wk-alert-ok { background: rgba(34,197,94,.1); border-color: rgba(34,197,94,.3); color: #4ade80; }

    /* ── Paginación ── */
    .wk-pagination {
      display: flex; justify-content: center; align-items: center; gap: 6px;
      margin-top: 20px;
    }
    .wk-pagination .page-link {
      background: var(--wk-surface-2);
      border: 1px solid var(--wk-border-2);
      color: var(--wk-text-2);
      border-radius: 8px;
      min-width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
      text-decoration: none; transition: all .15s;
    }
    .wk-pagination .page-link:hover { border-color: rgba(255,106,0,.4); color: #ff8c3a; }
    .wk-pagination .page-item.active .page-link {
      background: rgba(255,106,0,.18); border-color: rgba(255,106,0,.45); color: #ff8c3a;
    }
    .wk-pagination .page-item.disabled .page-link { opacity: .35; pointer-events: none; }

    @media (max-width: 900px) {
      .us-thead { display: none; }
      .us-row { grid-template-columns: 1fr; gap: 6px; padding: 16px; }
      .us-actions { justify-content: flex-start; margin-top: 6px; }
    }
  </style>
</head>

<body>
  <canvas id="particlesBg"></canvas>
  <div class="wk-embers" id="wkEmbers"></div>
  <div th:replace="~{layout/navbar :: navbar}"></div>

  <main class="wk-main">
    <div class="wk-shell">

      <!-- ── Hero header ── -->
      <div class="wk-hero">
        <div>
          <div class="wk-hero-eyebrow"><span class="dot"></span>// ACMAFER · ADMINISTRACIÓN</div>
          <h1 class="wk-hero-title"><i class="bi bi-people"></i> <span data-i18n="usr_title">Gestión de Usuarios</span></h1>
          <p class="wk-hero-sub" th:text="'Total: ' + ${pagina.totalElements} + ' usuarios'"></p>
        </div>
        <div class="wk-hero-actions">
          <a th:href="@{/usuarios/nuevo}" class="wk-btn-primary">
            <i class="bi bi-person-plus"></i> Nuevo usuario
          </a>
        </div>
      </div>

      <!-- Alertas -->
      <div class="alert wk-alert wk-alert-ok alert-dismissible fade show" th:if="${exito}">
        <i class="bi bi-check-circle-fill"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <!-- ── KPI strip ── -->
      <div class="wk-kpis" th:unless="${pagina.content.isEmpty()}">
        <div class="wk-kpi orange">
          <i class="bi bi-people wk-kpi-icon"></i>
          <div class="wk-kpi-val" th:text="${pagina.totalElements}">0</div>
          <div class="wk-kpi-label">Total usuarios</div>
        </div>
        <div class="wk-kpi green">
          <i class="bi bi-person-check wk-kpi-icon"></i>
          <div class="wk-kpi-val" th:text="${pagina.content.?[estado == 'Activo'].size()}">0</div>
          <div class="wk-kpi-label">Activos (página)</div>
        </div>
        <div class="wk-kpi red">
          <i class="bi bi-person-lock wk-kpi-icon"></i>
          <div class="wk-kpi-val" th:text="${pagina.content.?[bloqueado == true].size()}">0</div>
          <div class="wk-kpi-label">Bloqueados (página)</div>
        </div>
      </div>

      <!-- ── Búsqueda ── -->
      <div class="wk-section-title"><i class="bi bi-search"></i> Buscar</div>
      <div class="wk-card">
        <div class="wk-card-body">
          <form th:action="@{/usuarios}" method="get" class="us-search-form">
            <input type="text" name="q" class="wk-input" th:value="${filtroQ}"
                   placeholder="Buscar por nombre, apellido o correo..." />
            <button type="submit" class="wk-btn-search">
              <i class="bi bi-search"></i> Buscar
            </button>
          </form>
        </div>
      </div>

      <!-- ── Tabla de usuarios ── -->
      <div class="wk-section-title"><i class="bi bi-list-ul"></i> Usuarios registrados</div>
      <div class="wk-card">
        <div class="wk-card-head"><div class="wk-glow"></div><i class="bi bi-person-lines-fill"></i> Directorio</div>

        <!-- Cabecera -->
        <div class="us-thead">
          <div class="us-thead-cell">USUARIO</div>
          <div class="us-thead-cell">CORREO</div>
          <div class="us-thead-cell">DOCUMENTO</div>
          <div class="us-thead-cell">ROL</div>
          <div class="us-thead-cell">ESTADO</div>
          <div class="us-thead-cell">BLOQUEADO</div>
          <div class="us-thead-cell" style="text-align:right">ACCIONES</div>
        </div>

        <!-- Filas -->
        <div th:each="u : ${pagina.content}" class="us-row">
          <div class="us-user">
            <span class="us-avatar" th:text="${u.iniciales}">??</span>
            <div>
              <div class="us-name" th:text="${u.nombreCompleto}">Nombre</div>
              <div class="us-phone" th:text="${u.celular}"></div>
            </div>
          </div>
          <div class="us-cell" th:text="${u.email}">correo</div>
          <div class="us-cell" th:text="${u.documento}">doc</div>
          <div>
            <span class="mp-badge"
                  th:classappend="${u.rol != null and u.rol.name() == 'ADMINISTRADOR'} ? 'admin' :
                             (${u.rol != null and u.rol.name() == 'SUPERVISOR'} ? 'supervisor' :
                             (${u.rol != null and u.rol.name() == 'VENDEDOR'} ? 'vendedor' : 'neutro'))">
              <span class="mp-dot"></span>
              <span th:text="${u.rol != null ? u.rol.name() : 'Sin rol'}">ROL</span>
            </span>
          </div>
          <div>
            <span class="mp-badge" th:classappend="${u.estado == 'Activo'} ? 'activo' : 'inactivo'">
              <span class="mp-dot"></span>
              <span th:text="${u.estado}">Estado</span>
            </span>
          </div>
          <div>
            <span th:if="${u.bloqueado}" class="mp-badge bloqueado"><span class="mp-dot"></span>OFF</span>
            <span th:unless="${u.bloqueado}" class="mp-badge desbloqueado"><span class="mp-dot"></span>ON</span>
          </div>
          <div class="us-actions">
            <a th:href="@{'/usuarios/editar/' + ${u.id}}" class="us-btn-icon" title="Editar">
              <i class="bi bi-pencil"></i>
            </a>
            <form th:action="@{'/usuarios/' + ${u.id} + '/cambiar-estado'}" method="post" class="m-0">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <input type="hidden" name="estado" th:value="${u.estado == 'Activo'} ? 'Inactivo' : 'Activo'" />
              <button type="submit"
                      th:class="${u.estado == 'Activo'} ? 'us-btn-danger' : 'us-btn-icon'"
                      th:data-confirm="${u.estado == 'Activo'} ? '¿Desactivar este usuario?' : '¿Activar este usuario?'">
                <i th:class="${u.estado == 'Activo'} ? 'bi bi-person-x' : 'bi bi-person-check'"></i>
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Paginación -->
      <nav th:if="${pagina.totalPages > 1}">
        <ul class="wk-pagination">
          <li class="page-item" th:classappend="${pagina.first}?'disabled'">
            <a class="page-link" th:href="@{/usuarios(page=${pagina.number-1},q=${filtroQ})}"><i class="bi bi-chevron-left"></i></a>
          </li>
          <li class="page-item" th:each="i : ${#numbers.sequence(0,pagina.totalPages-1)}"
              th:classappend="${i==pagina.number}?'active'">
            <a class="page-link" th:href="@{/usuarios(page=${i},q=${filtroQ})}" th:text="${i+1}">1</a>
          </li>
          <li class="page-item" th:classappend="${pagina.last}?'disabled'">
            <a class="page-link" th:href="@{/usuarios(page=${pagina.number+1},q=${filtroQ})}"><i class="bi bi-chevron-right"></i></a>
          </li>
        </ul>
      </nav>

    </div><!-- /wk-shell -->
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Brasas flotantes decorativas (igual que Panel Trabajador / Mis Pedidos)
    (function wkEmbers() {
      const container = document.getElementById('wkEmbers');
      if (!container) return;
      const count = 14;
      for (let i = 0; i < count; i++) {
        const ember = document.createElement('div');
        ember.className = 'wk-ember';
        const left = Math.random() * 100;
        const duration = 6 + Math.random() * 6;
        const delay = Math.random() * 8;
        const dx = (Math.random() - 0.5) * 60;
        ember.style.left = left + 'vw';
        ember.style.setProperty('--dx', dx + 'px');
        ember.style.animationDuration = duration + 's';
        ember.style.animationDelay = delay + 's';
        container.appendChild(ember);
      }
    })();
  </script>

  <div th:replace="~{layout/navbar :: chatbot}"></div>
  <div th:replace="~{layout/navbar :: cartNotif}"></div>
  <footer th:replace="~{layout/navbar :: footer}"></footer>
  <th:block th:replace="~{layout/navbar :: scripts}"></th:block>
</body>

</html>
