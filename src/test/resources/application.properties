# ═══════════════════════════════════════════════════════════════════════
# ACMAFER — configuración para pruebas (valores ficticios, no reales)
# ═══════════════════════════════════════════════════════════════════════
spring.application.name=acmafer-web-test

spring.datasource.url=jdbc:h2:mem:acmafertest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

acmafer.mail.from=test@example.com
SENDGRID_API_KEY=test-key

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

server.port=8080
acmafer.bcrypt.strength=4
acmafer.token.expiracion-minutos=30
acmafer.captcha.intentos-antes-de-activar=3
acmafer.upload.directorio=uploads

spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

epayco.public-key=test
epayco.private-key=test
epayco.customer-id=test
epayco.p-key=test
epayco.test=true
epayco.response-url=http://localhost:8080/pedidos/pago/respuesta
epayco.confirmation-url=http://localhost:8080/pedidos/pago/confirmacion

groq.api.key=test-key
groq.api.url=https://api.groq.com/openai/v1/chat/completions