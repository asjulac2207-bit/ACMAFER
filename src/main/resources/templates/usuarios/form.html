<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <title th:text="${esNuevo} ? 'Nuevo Usuario — ACMAFER' : 'Editar Usuario — ACMAFER'">Usuario — ACMAFER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link th:href="@{/css/acmafer.css}" rel="stylesheet" />
</head>

<body>
    <canvas id="particlesBg"></canvas>
    <div th:replace="~{layout/navbar :: navbar}"></div>
    <main class="acm-main" style="padding-top:80px">
        <div class="container" style="max-width:620px">
            <a th:href="@{/usuarios}" class="acm-btn acm-btn-outline acm-btn-sm mb-4">
                <i class="bi bi-arrow-left"></i> Volver a usuarios
            </a>

            <div class="acm-page-header">
                <h1 class="acm-page-title">
                    <i th:class="${esNuevo} ? 'bi bi-person-plus me-2' : 'bi bi-pencil-square me-2'"></i>
                    <span th:text="${esNuevo} ? 'Nuevo Usuario' : 'Editar Usuario'">Usuario</span>
                </h1>
                <p class="acm-page-sub"
                    th:text="${esNuevo} ? 'Registra un nuevo usuario y asígnale un rol.' : 'Modifica los datos del usuario.'">
                </p>
            </div>

            <div class="acm-card">
                <div class="acm-card-body">
                    <form th:action="${esNuevo} ? @{/usuarios/nuevo} : @{'/usuarios/editar/' + ${usuario?.id}}"
                        th:object="${dto}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label class="acm-label">Nombre *</label>
                                <input type="text" th:field="*{nombre}" class="acm-input"
                                    th:classappend="${#fields.hasErrors('nombre')} ? 'border-danger'"
                                    placeholder="Nombre" />
                                <div class="text-danger mt-1" style="font-size:12px"
                                    th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                            </div>
                            <div class="col-sm-6">
                                <label class="acm-label">Apellido *</label>
                                <input type="text" th:field="*{apellido}" class="acm-input"
                                    th:classappend="${#fields.hasErrors('apellido')} ? 'border-danger'"
                                    placeholder="Apellido" />
                                <div class="text-danger mt-1" style="font-size:12px"
                                    th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="acm-label">Documento *</label>
                            <input type="text" th:field="*{documento}" class="acm-input"
                                placeholder="Número de documento" th:readonly="${!esNuevo}" />
                            <div class="text-danger mt-1" style="font-size:12px"
                                th:if="${#fields.hasErrors('documento')}" th:errors="*{documento}"></div>
                            <small th:if="${!esNuevo}" style="color:var(--acm-gray);font-size:12px">
                                El documento no puede modificarse.
                            </small>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="acm-label">Correo electrónico *</label>
                            <input type="email" name="email" class="acm-input"
                                th:classappend="${#fields.hasErrors('email')} ? 'border-danger'"
                                th:value="${esNuevo} ? '' : *{email}" placeholder="correo@acmafer.com"
                                autocomplete="off" />
                            <div class="text-danger mt-1" style="font-size:12px" th:if="${#fields.hasErrors('email')}"
                                th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="acm-label">Celular</label>
                            <input type="text" th:field="*{celular}" class="acm-input" placeholder="300 000 0000" />
                        </div>

                        <!-- Selector de rol -->
                        <div class="mb-3">
                            <label class="acm-label">Rol *</label>
                            <select name="rol" class="acm-input" required>
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                                    th:selected="${usuario != null and usuario.rol == r}">ROL</option>
                            </select>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-4">
                            <label class="acm-label"
                                th:text="${esNuevo} ? 'Contraseña temporal *' : 'Nueva contraseña (dejar vacío para no cambiar)'">
                                Contraseña
                            </label>
                            <input type="password" name="clave" class="acm-input"
                                th:classappend="${#fields.hasErrors('clave')} ? 'border-danger'"
                                placeholder="Mínimo 8 caracteres" th:required="${esNuevo}" minlength="8"
                                autocomplete="new-password" />
                            <div class="text-danger mt-1" style="font-size:12px" th:if="${#fields.hasErrors('clave')}"
                                th:errors="*{clave}"></div>
                            <small th:if="${esNuevo}" style="color:var(--acm-gray);font-size:12px">
                                El usuario deberá cambiarla en su primer ingreso.
                            </small>
                        </div>

                        <!-- Botones de acción -->
                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="acm-btn acm-btn-primary">
                                <i th:class="${esNuevo} ? 'bi bi-person-plus' : 'bi bi-floppy'"></i>
                                <span th:text="${esNuevo} ? 'Crear usuario' : 'Guardar cambios'">Guardar</span>
                            </button>
                            <a th:href="@{/usuarios}" class="acm-btn acm-btn-outline">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/acmafer.js}"></script>
    <div th:replace="~{layout/navbar :: chatbot}"></div>
    <div th:replace="~{layout/navbar :: cartNotif}"></div>
    <footer th:replace="~{layout/navbar :: footer}"></footer>
    <th:block th:replace="~{layout/navbar :: scripts}"></th:block>
</body>

</html>
